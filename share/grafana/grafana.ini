# Grafana configuration for vllm-monitoring
#
# Most settings are controlled via GF_* environment variables set by the
# consuming manifest and vllm-monitoring-init. This file only contains
# settings that must be in the INI file or have no GF_* equivalent.
#
# Dynamic paths (set by vllm-monitoring-init):
#   GF_PATHS_PROVISIONING  = $FLOX_ENV/share/vllm-flox-monitoring/grafana/provisioning
#   GF_PATHS_DATA          = $FLOX_ENV_PROJECT/grafana/data
#
# Server binding (set in consuming manifest [vars]):
#   GF_SERVER_HTTP_ADDR    = 127.0.0.1
#   GF_SERVER_HTTP_PORT    = 3000
#
# Credentials (set in consuming manifest [vars]):
#   GF_SECURITY_ADMIN_PASSWORD = admin

[auth.anonymous]
enabled = true
org_role = Viewer

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false
